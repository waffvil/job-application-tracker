<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Job Application Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%92%BC%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e4e4e0;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2f2f2f;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

    --st-applied-bg: #ececec;   --st-applied-fg: #444;
    --st-screening-bg: #fff3d6; --st-screening-fg: #8a5a00;
    --st-interview-bg: #dbeafe;  --st-interview-fg: #1e40af;
    --st-offer-bg: #d7f5df;      --st-offer-fg: #17663a;
    --st-rejected-bg: #fbdcdc;   --st-rejected-fg: #a12525;
    --st-withdrawn-bg: #eae6f2;  --st-withdrawn-fg: #5b4a80;

    --cat-pm-bg: #e3ecff;      --cat-pm-fg: #2544b3;
    --cat-finance-bg: #d9f2e4; --cat-finance-fg: #10633b;
    --cat-other-bg: #ededed;   --cat-other-fg: #555;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 15px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 80px; }

  header h1 { font-size: 1.5rem; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.01em; }
  header p { margin: 0 0 20px; color: var(--muted); font-size: 0.9rem; }

  .muted { color: var(--muted); }
  code { background: #eee; padding: 1px 6px; border-radius: 5px; font-size: 0.85em; word-break: break-all; }

  /* Sync bar */
  .sync-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sync-status { display: inline-flex; align-items: center; gap: 7px; font-size: 0.85rem; font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #bbb; flex-shrink: 0; }
  .dot.ok { background: #2fa860; }
  .dot.saving { background: #d9a300; }
  .dot.error { background: #c0392b; }
  .dot.off { background: #bbb; }
  .sync-row .spacer { flex: 1; }

  /* Card (used by sync/setup) */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 22px;
  }
  .card h2 { margin: 0 0 16px; font-size: 1.05rem; font-weight: 600; }
  .card.setup { border-color: #d8c48a; background: #fffdf5; }

  /* Buttons */
  .btn {
    font: inherit; font-weight: 600; cursor: pointer; border: 1px solid transparent;
    border-radius: 8px; padding: 9px 16px; background: var(--accent); color: #fff;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn.secondary { background: #fff; color: var(--text); border-color: var(--border); }
  .btn.small { padding: 5px 11px; font-size: 0.82rem; }
  .btn.danger { background: #fff; color: #a12525; border-color: #e6bcbc; }

  .conn-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .conn-msg { margin-top: 12px; font-size: 0.85rem; }
  .conn-msg.err { color: #c0392b; }
  .conn-msg.ok { color: #17663a; }

  /* Field primitives (shared by setup card + drawer) */
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
  label .req { color: #c0392b; }
  input, select, textarea {
    font: inherit; padding: 9px 11px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; color: var(--text); width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #9a9a9a; box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  textarea { resize: vertical; min-height: 70px; }
  textarea.jd { min-height: 120px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab {
    padding: 9px 16px; font: inherit; font-size: 0.92rem; font-weight: 600;
    color: var(--muted); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .cnt {
    display: inline-block; margin-left: 7px; font-size: 0.72rem; font-weight: 700;
    background: #ececec; color: #555; border-radius: 999px; padding: 1px 8px; vertical-align: middle;
  }
  .tab.active .cnt { background: var(--accent); color: #fff; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .toolbar input[type="search"], .toolbar select { width: auto; flex: 1 1 180px; }
  .toolbar .right { display: flex; gap: 8px; margin-left: auto; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead th {
    text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); font-weight: 700; padding: 12px 14px;
    border-bottom: 1px solid var(--border); white-space: nowrap; background: #fbfbfa;
  }
  tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: #f6f6f4; }
  .col-company { font-weight: 600; }
  .col-role { color: var(--muted); }
  .col-date { white-space: nowrap; color: var(--muted); font-variant-numeric: tabular-nums; }
  .col-link a { color: #1e40af; text-decoration: none; }
  .col-link a:hover { text-decoration: underline; }
  .dash { color: #c9c9c5; }

  /* Tags & badges */
  .tag {
    font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    white-space: nowrap; letter-spacing: 0.02em; display: inline-block;
  }
  .tag.PM { background: var(--cat-pm-bg); color: var(--cat-pm-fg); }
  .tag.Finance { background: var(--cat-finance-bg); color: var(--cat-finance-fg); }
  .tag.Other { background: var(--cat-other-bg); color: var(--cat-other-fg); }

  .badge {
    font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block;
  }
  .badge.Applied   { background: var(--st-applied-bg);   color: var(--st-applied-fg); }
  .badge.Screening { background: var(--st-screening-bg); color: var(--st-screening-fg); }
  .badge.Interview { background: var(--st-interview-bg); color: var(--st-interview-fg); }
  .badge.Offer     { background: var(--st-offer-bg);     color: var(--st-offer-fg); }
  .badge.Rejected  { background: var(--st-rejected-bg);  color: var(--st-rejected-fg); }
  .badge.Withdrawn { background: var(--st-withdrawn-bg); color: var(--st-withdrawn-fg); }

  .empty { text-align: center; color: var(--muted); padding: 48px 20px; }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 460px; max-width: 94vw;
    background: var(--surface); box-shadow: -6px 0 28px rgba(0,0,0,0.14);
    transform: translateX(100%); transition: transform 0.22s ease; z-index: 41;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: none; }
  .drawer-head {
    padding: 20px 22px 16px; border-bottom: 1px solid var(--border); position: relative;
  }
  .drawer-head .close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    font-size: 1.4rem; line-height: 1; color: var(--muted); cursor: pointer; padding: 4px 8px;
  }
  .drawer-head .close:hover { color: var(--text); }
  .drawer-title { font-size: 1.15rem; font-weight: 650; margin: 0; padding-right: 36px; letter-spacing: -0.01em; }
  .drawer-sub { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }
  .drawer-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .drawer-grid .full { grid-column: 1 / -1; }
  .drawer-foot {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .drawer-foot .spacer { flex: 1; }

  @media (max-width: 560px) {
    .drawer-grid { grid-template-columns: 1fr; }
    .toolbar .right { margin-left: 0; width: 100%; }
    .toolbar input[type="search"], .toolbar select { flex: 1 1 100%; }
    /* On small screens, collapse less-critical columns */
    .col-cv, .th-cv { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>💼 Job Application Tracker</h1>
    <p>Every application in one table — split by track, synced as a CSV on your GitHub, across devices.</p>
  </header>

  <!-- Sync / connection card (rendered by JS) -->
  <div class="card" id="syncCard"></div>

  <!-- Tabs (PM / Finance / All) -->
  <div class="tabs" id="tabs"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search company or role…" />
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option>Applied</option><option>Screening</option><option>Interview</option>
      <option>Offer</option><option>Rejected</option><option>Withdrawn</option>
    </select>
    <div class="right">
      <button class="btn small" id="addBtn">+ Add application</button>
      <button class="btn secondary small" id="exportCsv">Export CSV</button>
      <button class="btn secondary small" id="exportJson">Export JSON</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-date">Date</th>
          <th class="th-track">Track</th>
          <th class="th-company">Company</th>
          <th class="th-role">Role</th>
          <th class="th-status">Status</th>
          <th class="th-cv">CV</th>
          <th class="th-link">Link</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Slide-out drawer for add / edit -->
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <button class="close" id="drawerClose" title="Close">×</button>
    <h2 class="drawer-title" id="drawerTitle">Add application</h2>
    <div class="drawer-sub" id="drawerSub"></div>
  </div>
  <div class="drawer-body">
    <form id="appForm" autocomplete="off">
      <input type="hidden" id="editId" />
      <div class="drawer-grid">
        <div class="field full">
          <label for="company">Company name <span class="req">*</span></label>
          <input type="text" id="company" required />
        </div>
        <div class="field full">
          <label for="role">Job title / role</label>
          <input type="text" id="role" />
        </div>
        <div class="field">
          <label for="category">Track</label>
          <select id="category">
            <option>PM</option><option>Finance</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="status">Status</label>
          <select id="status">
            <option>Applied</option><option>Screening</option><option>Interview</option>
            <option>Offer</option><option>Rejected</option><option>Withdrawn</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Application date</label>
          <input type="date" id="date" />
        </div>
        <div class="field">
          <label for="cv">CV version used</label>
          <input type="text" id="cv" placeholder="e.g. PM CV v3" />
        </div>
        <div class="field full">
          <label for="link">Link to posting</label>
          <input type="url" id="link" placeholder="https://…" />
        </div>
        <div class="field full">
          <label for="jd">Job description</label>
          <textarea id="jd" class="jd" placeholder="Paste the full JD here…"></textarea>
        </div>
        <div class="field full">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Anything worth remembering…"></textarea>
        </div>
      </div>
    </form>
  </div>
  <div class="drawer-foot">
    <button type="submit" form="appForm" class="btn" id="submitBtn">Add application</button>
    <span class="spacer"></span>
    <button type="button" class="btn danger small" id="deleteBtn" style="display:none;">Delete</button>
  </div>
</aside>

<script>
(function () {
  "use strict";

  // ---- Config ----
  var LS_TOKEN = "jat.token";
  var LS_GIST  = "jat.gistId";
  var LS_CACHE = "jat.cache";
  var OLD_KEY  = "jobApplications.v1"; // migrate from the pre-sync version
  var FILENAME = "job-applications.csv";
  var STATUSES = ["Applied", "Screening", "Interview", "Offer", "Rejected", "Withdrawn"];
  var CATEGORIES = ["PM", "Finance", "Other"];
  var COLS = ["id", "createdAt", "company", "role", "category", "date", "cv", "status", "link", "jd", "notes"];

  // ---- State ----
  var token  = localStorage.getItem(LS_TOKEN) || null;
  var gistId = localStorage.getItem(LS_GIST)  || null;
  var entries = loadCache();
  var currentTab = "PM";        // "" (all) | "PM" | "Finance" | "Other"
  var syncState = token && gistId ? "idle" : "off"; // off | idle | saving | ok | error | pulling
  var syncMsg = "";
  var saving = false, pendingSave = false;

  // ---- Elements ----
  var form = document.getElementById("appForm");
  var tbody = document.getElementById("tbody");
  var tabsEl = document.getElementById("tabs");
  var syncCard = document.getElementById("syncCard");
  var searchEl = document.getElementById("search");
  var statusFilterEl = document.getElementById("statusFilter");
  var editIdEl = document.getElementById("editId");
  var drawer = document.getElementById("drawer");
  var backdrop = document.getElementById("backdrop");
  var drawerTitle = document.getElementById("drawerTitle");
  var drawerSub = document.getElementById("drawerSub");
  var submitBtn = document.getElementById("submitBtn");
  var deleteBtn = document.getElementById("deleteBtn");
  var dateEl = document.getElementById("date");

  // ---- Init ----
  renderAll();
  if (token && gistId) { pull(); }  // pull latest from the Gist on load

  // =========================================================
  //  Cache (instant offline display + fallback)
  // =========================================================
  function loadCache() {
    try {
      var raw = localStorage.getItem(LS_CACHE);
      if (raw) return normalize(JSON.parse(raw));
      var old = localStorage.getItem(OLD_KEY); // one-time migration
      if (old) return normalize(JSON.parse(old));
      return [];
    } catch (e) { return []; }
  }
  function normalize(list) {
    (list || []).forEach(function (e) { if (!e.category) e.category = "PM"; });
    return list || [];
  }
  function saveCache() {
    try { localStorage.setItem(LS_CACHE, JSON.stringify(entries)); } catch (e) {}
  }

  // =========================================================
  //  GitHub Gist API
  // =========================================================
  function api(method, path, body) {
    return fetch("https://api.github.com" + path, {
      method: method,
      headers: {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: body ? JSON.stringify(body) : undefined
    }).then(function (res) {
      if (!res.ok) {
        return res.text().then(function (t) {
          var m = res.status;
          if (res.status === 401) m = "401 — token rejected. Check the token.";
          else if (res.status === 404) m = "404 — Gist not found. Check the Gist ID.";
          else if (res.status === 403) m = "403 — rate limited or token lacks 'gist' scope.";
          throw new Error("GitHub " + m + (t ? " " + t.slice(0, 120) : ""));
        });
      }
      return res.status === 204 ? {} : res.json();
    });
  }

  function pull() {
    if (!token || !gistId) return Promise.resolve();
    setSync("pulling");
    return api("GET", "/gists/" + gistId).then(function (g) {
      var f = g.files && g.files[FILENAME];
      var textPromise;
      if (!f) { textPromise = Promise.resolve(""); }
      else if (f.truncated && f.raw_url) { textPromise = fetch(f.raw_url).then(function (r) { return r.text(); }); }
      else { textPromise = Promise.resolve(f.content || ""); }
      return textPromise;
    }).then(function (text) {
      entries = normalize(fromCSV(text));
      saveCache();
      setSync("ok");
      renderAll();
    }).catch(function (e) {
      setSync("error", e.message);
      renderAll();
    });
  }

  function push() {
    if (!token || !gistId) return;
    if (saving) { pendingSave = true; return; }
    saving = true;
    setSync("saving");
    var files = {}; files[FILENAME] = { content: toCSV(entries) };
    api("PATCH", "/gists/" + gistId, { files: files }).then(function () {
      saving = false;
      setSync("ok");
      if (pendingSave) { pendingSave = false; push(); }
    }).catch(function (e) {
      saving = false;
      setSync("error", e.message);
    });
  }

  function connect(inToken, inGist) {
    token = inToken;
    setConnMsg("Connecting…", "");
    var ready;
    if (inGist) {
      gistId = inGist;
      ready = pull().then(function () {
        if (syncState === "error") throw new Error(syncMsg);
      });
    } else {
      setConnMsg("Creating a private Gist…", "");
      var files = {}; files[FILENAME] = { content: toCSV(entries) };
      ready = api("POST", "/gists", {
        description: "Job Application Tracker — data (private)",
        public: false,
        files: files
      }).then(function (g) {
        gistId = g.id;
        return pull();
      });
    }
    return ready.then(function () {
      localStorage.setItem(LS_TOKEN, token);
      localStorage.setItem(LS_GIST, gistId);
      setSync("ok");
      renderAll();
    }).catch(function (e) {
      token = localStorage.getItem(LS_TOKEN) || null;
      gistId = localStorage.getItem(LS_GIST) || null;
      setConnMsg("Failed: " + e.message, "err");
    });
  }

  function disconnect() {
    localStorage.removeItem(LS_TOKEN);
    localStorage.removeItem(LS_GIST);
    token = null; gistId = null;
    setSync("off");
    renderAll();
  }

  // =========================================================
  //  CSV
  // =========================================================
  function csvCell(v) {
    var s = v == null ? "" : String(v);
    if (/[",\r\n]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function toCSV(list) {
    var rows = [COLS.join(",")];
    list.forEach(function (e) {
      rows.push(COLS.map(function (c) { return csvCell(e[c]); }).join(","));
    });
    return rows.join("\r\n");
  }
  function parseCSV(text) {
    var rows = [], row = [], field = "", i = 0, inQ = false;
    while (i < text.length) {
      var ch = text[i];
      if (inQ) {
        if (ch === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQ = false; i++; continue;
        }
        field += ch; i++; continue;
      } else {
        if (ch === '"') { inQ = true; i++; continue; }
        if (ch === ",") { row.push(field); field = ""; i++; continue; }
        if (ch === "\r") { i++; continue; }
        if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
        field += ch; i++; continue;
      }
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    return rows;
  }
  function fromCSV(text) {
    if (!text || !text.trim()) return [];
    var rows = parseCSV(text);
    if (!rows.length) return [];
    var header = rows[0];
    var out = [];
    for (var i = 1; i < rows.length; i++) {
      var r = rows[i];
      if (r.length === 1 && r[0] === "") continue;
      var obj = {};
      header.forEach(function (h, idx) { obj[h] = r[idx] != null ? r[idx] : ""; });
      obj.createdAt = obj.createdAt ? Number(obj.createdAt) : 0;
      if (!obj.id) obj.id = uid();
      if (!obj.category) obj.category = "PM";
      out.push(obj);
    }
    return out;
  }

  // =========================================================
  //  Helpers
  // =========================================================
  function today() {
    var d = new Date();
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function catClass(c) { return CATEGORIES.indexOf(c) === -1 ? "Other" : c; }
  function fmtDate(iso) {
    if (!iso) return "—";
    var p = String(iso).split("-");
    if (p.length !== 3) return iso;
    var d = new Date(p[0], p[1] - 1, p[2]);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
  }

  function persist() { saveCache(); push(); }

  // =========================================================
  //  Drawer (add / edit)
  // =========================================================
  function openDrawer(entry) {
    if (entry) {
      editIdEl.value = entry.id;
      document.getElementById("company").value = entry.company || "";
      document.getElementById("role").value = entry.role || "";
      document.getElementById("category").value = catClass(entry.category);
      dateEl.value = entry.date || today();
      document.getElementById("cv").value = entry.cv || "";
      document.getElementById("status").value = entry.status || "Applied";
      document.getElementById("link").value = entry.link || "";
      document.getElementById("jd").value = entry.jd || "";
      document.getElementById("notes").value = entry.notes || "";
      drawerTitle.textContent = entry.company || "Application";
      drawerSub.textContent = [entry.role, catClass(entry.category)].filter(Boolean).join(" · ");
      submitBtn.textContent = "Save changes";
      deleteBtn.style.display = "";
    } else {
      form.reset();
      editIdEl.value = "";
      document.getElementById("category").value = (currentTab && currentTab !== "") ? currentTab : "PM";
      dateEl.value = today();
      drawerTitle.textContent = "Add application";
      drawerSub.textContent = "";
      submitBtn.textContent = "Add application";
      deleteBtn.style.display = "none";
    }
    drawer.classList.add("open");
    backdrop.classList.add("open");
    drawer.setAttribute("aria-hidden", "false");
    setTimeout(function () { document.getElementById("company").focus(); }, 60);
  }
  function closeDrawer() {
    drawer.classList.remove("open");
    backdrop.classList.remove("open");
    drawer.setAttribute("aria-hidden", "true");
  }

  document.getElementById("addBtn").addEventListener("click", function () { openDrawer(null); });
  document.getElementById("drawerClose").addEventListener("click", closeDrawer);
  backdrop.addEventListener("click", closeDrawer);
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeDrawer(); });

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var company = document.getElementById("company").value.trim();
    if (!company) return;
    var data = {
      company: company,
      role: document.getElementById("role").value.trim(),
      category: document.getElementById("category").value,
      date: dateEl.value || today(),
      cv: document.getElementById("cv").value.trim(),
      status: document.getElementById("status").value,
      link: document.getElementById("link").value.trim(),
      jd: document.getElementById("jd").value.trim(),
      notes: document.getElementById("notes").value.trim()
    };
    var id = editIdEl.value;
    if (id) {
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].id === id) { entries[i] = Object.assign(entries[i], data); break; }
      }
    } else {
      data.id = uid();
      data.createdAt = Date.now();
      entries.push(data);
    }
    persist();
    closeDrawer();
    renderAll();
  });

  deleteBtn.addEventListener("click", function () {
    var id = editIdEl.value;
    if (!id) return;
    var en = findById(id);
    if (confirm("Delete " + (en ? en.company : "this application") + "? This cannot be undone.")) {
      entries = entries.filter(function (x) { return x.id !== id; });
      persist();
      closeDrawer();
      renderAll();
    }
  });

  // ---- Filters ----
  searchEl.addEventListener("input", renderList);
  statusFilterEl.addEventListener("change", renderList);

  function getFiltered() {
    var q = searchEl.value.trim().toLowerCase();
    var sf = statusFilterEl.value;
    return entries.filter(function (e) {
      if (currentTab && catClass(e.category) !== currentTab) return false;
      if (sf && e.status !== sf) return false;
      if (q && ((e.company || "") + " " + (e.role || "")).toLowerCase().indexOf(q) === -1) return false;
      return true;
    }).sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
  }

  // =========================================================
  //  Render
  // =========================================================
  function renderAll() { renderSync(); renderTabs(); renderList(); }

  function setSync(state, msg) { syncState = state; syncMsg = msg || ""; renderSync(); }

  function renderTabs() {
    var counts = { "": entries.length, PM: 0, Finance: 0, Other: 0 };
    entries.forEach(function (e) { counts[catClass(e.category)]++; });
    var tabsDef = [
      { key: "PM", label: "PM roles" },
      { key: "Finance", label: "Finance roles" },
      { key: "", label: "All" }
    ];
    if (counts.Other > 0) tabsDef.splice(2, 0, { key: "Other", label: "Other" });
    tabsEl.innerHTML = tabsDef.map(function (t) {
      return '<button class="tab' + (currentTab === t.key ? " active" : "") + '" data-tab="' + t.key + '">' +
        esc(t.label) + '<span class="cnt">' + counts[t.key] + '</span></button>';
    }).join("");
  }

  tabsEl.addEventListener("click", function (e) {
    var t = e.target.closest("[data-tab]");
    if (!t) return;
    currentTab = t.getAttribute("data-tab");
    renderTabs();
    renderList();
  });

  function renderSync() {
    if (!token || !gistId) {
      syncCard.className = "card setup";
      syncCard.innerHTML =
        '<h2>Connect to sync across devices</h2>' +
        '<p class="muted">Your applications are saved as a private CSV on your GitHub. ' +
        'Paste your token below. On your <strong>first device</strong>, leave the Gist ID blank — ' +
        'a new private Gist is created and its ID shown here to reuse elsewhere.</p>' +
        '<div style="display:grid;grid-template-columns:1fr;gap:14px;">' +
          '<div class="field"><label for="tokenInput">GitHub token</label>' +
            '<input type="password" id="tokenInput" placeholder="ghp_… (stored only in this browser)" /></div>' +
          '<div class="field"><label for="gistInput">Gist ID ' +
            '<span class="muted">— blank on first device; paste the shown ID on others</span></label>' +
            '<input type="text" id="gistInput" placeholder="(leave blank to create a new private Gist)" /></div>' +
        '</div>' +
        '<div class="conn-actions"><button class="btn" id="connectBtn">Connect &amp; sync</button></div>' +
        '<div class="conn-msg" id="connMsg"></div>';
      var cb = document.getElementById("connectBtn");
      cb.addEventListener("click", function () {
        var t = document.getElementById("tokenInput").value.trim();
        var g = document.getElementById("gistInput").value.trim();
        if (!t) { setConnMsg("Please paste your GitHub token.", "err"); return; }
        cb.disabled = true; cb.textContent = "Connecting…";
        connect(t, g);
      });
      if (syncMsg) setConnMsg(syncMsg, "err");
      return;
    }

    var label = { idle: "Synced", ok: "Synced", saving: "Saving…", pulling: "Refreshing…",
                  error: "Sync error", off: "Not connected" }[syncState] || "Synced";
    var dotClass = { ok: "ok", idle: "ok", saving: "saving", pulling: "saving",
                     error: "error", off: "off" }[syncState] || "ok";
    syncCard.className = "card";
    syncCard.innerHTML =
      '<div class="sync-row">' +
        '<span class="sync-status"><span class="dot ' + dotClass + '"></span>' + esc(label) + '</span>' +
        (syncState === "error" && syncMsg ? '<span class="muted" style="font-size:0.8rem;">' + esc(syncMsg) + '</span>' : '') +
        '<span class="spacer"></span>' +
        '<button class="btn secondary small" id="refreshBtn">Refresh</button>' +
        '<button class="btn secondary small" id="copyGistBtn">Copy Gist ID</button>' +
        '<button class="btn secondary small" id="disconnectBtn">Disconnect</button>' +
      '</div>' +
      '<p class="muted" style="margin:12px 0 0;font-size:0.82rem;">Private Gist: <code>' + esc(gistId) + '</code> · ' +
        'On another device, connect with this same Gist ID.</p>';
    document.getElementById("refreshBtn").addEventListener("click", pull);
    document.getElementById("disconnectBtn").addEventListener("click", function () {
      if (confirm("Disconnect this device? Your data stays safe in the Gist; you can reconnect with the same Gist ID.")) disconnect();
    });
    document.getElementById("copyGistBtn").addEventListener("click", function () {
      var btn = this;
      var done = function () { btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy Gist ID"; }, 1500); };
      if (navigator.clipboard) { navigator.clipboard.writeText(gistId).then(done, function(){ prompt("Gist ID:", gistId); }); }
      else { prompt("Gist ID:", gistId); }
    });
  }

  function setConnMsg(msg, cls) {
    var el = document.getElementById("connMsg");
    if (el) { el.textContent = msg; el.className = "conn-msg " + (cls || ""); }
  }

  function renderList() {
    var items = getFiltered();
    if (!items.length) {
      var msg = entries.length ? "No applications match your filters." :
        "No applications yet. Click “+ Add application” to log your first one.";
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty">' + msg + '</div></td></tr>';
      return;
    }
    var html = "";
    items.forEach(function (e) {
      var cat = catClass(e.category);
      html += '<tr data-id="' + esc(e.id) + '">';
      html += '<td class="col-date">' + esc(fmtDate(e.date)) + '</td>';
      html += '<td><span class="tag ' + cat + '">' + esc(cat) + '</span></td>';
      html += '<td class="col-company">' + esc(e.company) + '</td>';
      html += '<td class="col-role">' + (e.role ? esc(e.role) : '<span class="dash">—</span>') + '</td>';
      html += '<td><span class="badge ' + esc(e.status) + '">' + esc(e.status) + '</span></td>';
      html += '<td class="col-cv">' + (e.cv ? esc(e.cv) : '<span class="dash">—</span>') + '</td>';
      html += '<td class="col-link">' + (e.link
        ? '<a href="' + esc(e.link) + '" target="_blank" rel="noopener" data-noopen="1">open ↗</a>'
        : '<span class="dash">—</span>') + '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  tbody.addEventListener("click", function (e) {
    if (e.target.closest("[data-noopen]")) return; // let the link open normally
    var tr = e.target.closest("tr[data-id]");
    if (!tr) return;
    var en = findById(tr.getAttribute("data-id"));
    if (en) openDrawer(en);
  });

  function findById(id) {
    for (var i = 0; i < entries.length; i++) if (entries[i].id === id) return entries[i];
    return null;
  }

  // =========================================================
  //  Export (local backup)
  // =========================================================
  document.getElementById("exportJson").addEventListener("click", function () {
    download(new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" }), "job-applications-" + today() + ".json");
  });
  document.getElementById("exportCsv").addEventListener("click", function () {
    download(new Blob([toCSV(entries)], { type: "text/csv" }), "job-applications-" + today() + ".csv");
  });
  function download(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
})();
</script>
</body>
</html>
