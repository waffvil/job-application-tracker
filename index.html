<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Application Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%92%BC%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e4e4e0;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2f2f2f;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

    --st-applied-bg: #ececec;   --st-applied-fg: #444;
    --st-screening-bg: #fff3d6; --st-screening-fg: #8a5a00;
    --st-interview-bg: #dbeafe;  --st-interview-fg: #1e40af;
    --st-offer-bg: #d7f5df;      --st-offer-fg: #17663a;
    --st-rejected-bg: #fbdcdc;   --st-rejected-fg: #a12525;
    --st-withdrawn-bg: #eae6f2;  --st-withdrawn-fg: #5b4a80;

    --cat-pm-bg: #e3ecff;      --cat-pm-fg: #2544b3;
    --cat-finance-bg: #d9f2e4; --cat-finance-fg: #10633b;
    --cat-other-bg: #ededed;   --cat-other-fg: #555;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 15px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 80px; }

  header h1 { font-size: 1.5rem; font-weight: 650; margin: 0 0 16px; letter-spacing: -0.01em; }

  .muted { color: var(--muted); }
  code { background: #eee; padding: 1px 6px; border-radius: 5px; font-size: 0.85em; word-break: break-all; }

  /* Sync bar */
  .sync-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sync-status { display: inline-flex; align-items: center; gap: 7px; font-size: 0.85rem; font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #bbb; flex-shrink: 0; }
  .dot.ok { background: #2fa860; }
  .dot.saving { background: #d9a300; }
  .dot.error { background: #c0392b; }
  .dot.off { background: #bbb; }
  .sync-row .spacer { flex: 1; }

  /* Card (used by sync/setup) */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 22px;
  }
  .card h2 { margin: 0 0 16px; font-size: 1.05rem; font-weight: 600; }
  .card.setup { border-color: #d8c48a; background: #fffdf5; }

  /* Buttons */
  .btn {
    font: inherit; font-weight: 600; cursor: pointer; border: 1px solid transparent;
    border-radius: 8px; padding: 9px 16px; background: var(--accent); color: #fff;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn.secondary { background: #fff; color: var(--text); border-color: var(--border); }
  .btn.small { padding: 5px 11px; font-size: 0.82rem; }
  .btn.danger { background: #fff; color: #a12525; border-color: #e6bcbc; }
  .btn.icon-btn { display: inline-flex; align-items: center; justify-content: center; padding: 5px 8px; }
  .btn.icon-btn svg { display: block; }
  .gist-line { margin: 0; font-size: 0.82rem; overflow-wrap: anywhere; }
  .sync-note { font-size: 0.82rem; color: var(--muted); }
  .sync-note.err { color: #c0392b; }
  .sync-break { display: none; }
  .settings-panel {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    display: grid; gap: 12px;
  }
  .cv-rule {
    display: grid; grid-template-columns: 130px 1fr 100px auto;
    gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .cv-rule input, .cv-rule select { padding: 7px 9px; font-size: 0.85rem; }
  .cv-rule .rule-del { padding: 6px 10px; }

  .conn-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .conn-msg { margin-top: 12px; font-size: 0.85rem; }
  .conn-msg.err { color: #c0392b; }
  .conn-msg.ok { color: #17663a; }

  /* Field primitives (shared by setup card + drawer) */
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
  label .req { color: #c0392b; }
  input, select, textarea {
    font: inherit; padding: 9px 11px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; color: var(--text); width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #9a9a9a; box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  textarea { resize: vertical; min-height: 70px; }
  textarea.jd { min-height: 120px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab {
    padding: 9px 16px; font: inherit; font-size: 0.92rem; font-weight: 600;
    color: var(--muted); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .cnt {
    display: inline-block; margin-left: 7px; font-size: 0.72rem; font-weight: 700;
    background: #ececec; color: #555; border-radius: 999px; padding: 1px 8px; vertical-align: middle;
  }
  .tab.active .cnt { background: var(--accent); color: #fff; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .toolbar input[type="search"], .toolbar select { width: auto; flex: 1 1 180px; }
  .toolbar .right { display: flex; gap: 8px; margin-left: auto; }
  .search-toggle { display: none; }
  .tab-short { display: none; }
  .date-short { display: none; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead th {
    text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); font-weight: 700; padding: 12px 14px;
    border-bottom: 1px solid var(--border); white-space: nowrap; background: #fbfbfa;
  }
  tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: #f6f6f4; }
  .col-company { font-weight: 600; }
  .col-role { color: var(--muted); }
  .col-date { white-space: nowrap; color: var(--muted); font-variant-numeric: tabular-nums; }
  .col-link a { color: #1e40af; text-decoration: none; }
  .col-link a:hover { text-decoration: underline; }
  .dash { color: #c9c9c5; }

  /* Tags & badges */
  .tag {
    font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    white-space: nowrap; letter-spacing: 0.02em; display: inline-block;
  }
  .tag.PM { background: var(--cat-pm-bg); color: var(--cat-pm-fg); }
  .tag.Finance { background: var(--cat-finance-bg); color: var(--cat-finance-fg); }
  .tag.Other { background: var(--cat-other-bg); color: var(--cat-other-fg); }

  .badge {
    font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block;
  }
  .badge.Applied   { background-color: var(--st-applied-bg);   color: var(--st-applied-fg); }
  .badge.Screening { background-color: var(--st-screening-bg); color: var(--st-screening-fg); }
  .badge.Interview { background-color: var(--st-interview-bg);  color: var(--st-interview-fg); }
  .badge.Offer     { background-color: var(--st-offer-bg);     color: var(--st-offer-fg); }
  .badge.Rejected  { background-color: var(--st-rejected-bg);  color: var(--st-rejected-fg); }
  .badge.Withdrawn { background-color: var(--st-withdrawn-bg); color: var(--st-withdrawn-fg); }

  /* Inline status dropdown in the table — looks like the badge, but editable */
  .status-select {
    -webkit-appearance: none; appearance: none;
    font-family: inherit; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.03em;
    width: auto; border: none; cursor: pointer;
    padding: 3px 22px 3px 10px;
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='8'%20height='6'%3E%3Cpath%20d='M0%200l4%205%204-5z'%20fill='%23888'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 8px center;
    line-height: 1.4;
  }
  .status-select:focus { outline: none; box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
  .status-select:hover { filter: brightness(0.97); }

  .empty { text-align: center; color: var(--muted); padding: 48px 20px; }

  /* Email alert flag on a row + attention bar */
  .alert-flag {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; margin-right: 7px; vertical-align: middle;
    background: #c0392b; color: #fff; border-radius: 50%;
    font-size: 0.7rem; font-weight: 800; cursor: pointer; flex-shrink: 0;
  }
  .alert-flag:hover { background: #a12525; }
  tr.has-alert { background: #fff6f5; }
  tr.has-alert:hover { background: #fdeeec; }
  .attention-pop {
    position: fixed; top: 18px; right: 18px; z-index: 60;
    max-width: 360px; width: calc(100vw - 36px);
    background: #fff3f1; border: 1px solid #f0c8c2; color: #8a2c22;
    border-radius: var(--radius); padding: 14px 40px 14px 16px;
    font-size: 0.88rem; font-weight: 600;
    box-shadow: 0 8px 28px rgba(0,0,0,0.16);
    animation: attn-in 0.25s ease;
  }
  @keyframes attn-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
  .attention-pop .sub { font-weight: 400; margin-top: 3px; }
  .attention-pop .actions { margin-top: 10px; }
  .attention-pop .btn.small { color: #8a2c22; border-color: #e6bcbc; }
  .attention-pop .close {
    position: absolute; top: 8px; right: 10px; background: none; border: none;
    font-size: 1.15rem; line-height: 1; color: #b0665c; cursor: pointer; padding: 4px;
  }
  .attention-pop .close:hover { color: #8a2c22; }
  .attention-pop .link-fills { margin-top: 10px; font-weight: 400; }
  .attention-pop .link-fills .lf-hint { font-size: 0.76rem; margin-bottom: 5px; }
  .attention-pop .link-fills textarea {
    width: 100%; box-sizing: border-box; min-height: 74px; resize: vertical;
    border: 1px solid #e6bcbc; border-radius: 6px; padding: 6px 8px;
    font-size: 0.76rem; font-family: inherit; background: #fff; color: inherit;
  }
  .attention-pop .link-fills .lf-result { font-size: 0.76rem; margin-top: 5px; }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 460px; max-width: 94vw;
    background: var(--surface); box-shadow: -6px 0 28px rgba(0,0,0,0.14);
    transform: translateX(100%); transition: transform 0.22s ease; z-index: 41;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: none; }
  .drawer-head {
    padding: 20px 22px 16px; border-bottom: 1px solid var(--border); position: relative;
  }
  .drawer-head .close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    font-size: 1.4rem; line-height: 1; color: var(--muted); cursor: pointer; padding: 4px 8px;
  }
  .drawer-head .close:hover { color: var(--text); }
  .drawer-title { font-size: 1.15rem; font-weight: 650; margin: 0; padding-right: 36px; letter-spacing: -0.01em; }
  .drawer-sub { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }
  .drawer-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .drawer-grid .full { grid-column: 1 / -1; }
  .drawer-foot {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .drawer-foot .spacer { flex: 1; }

  @media (max-width: 560px) {
    .wrap { padding: 16px 10px 60px; }
    header h1 { font-size: 1.25rem; margin-bottom: 12px; }
    .card { padding: 14px; margin-bottom: 16px; }

    /* Sync bar: status · note · Check email on line 1, action buttons below */
    .sync-row { gap: 8px 6px; }
    .sync-row .spacer { display: none; }
    .sync-row .sync-note {
      flex: 1 1 0; min-width: 0; font-size: 0.76rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sync-row #gmailBtn { margin-left: auto; }  /* stays far right even with no note */
    .sync-row .sync-break { display: block; flex-basis: 100%; height: 0; }
    .sync-row .sync-act { flex: 1 1 auto; padding: 7px 8px; font-size: 0.78rem; }
    .sync-row .btn.icon-btn.sync-act { flex: 0 0 auto; }
    .gist-line { font-size: 0.74rem; }

    /* Compact tabs: short labels, all four on one line */
    .tabs { gap: 0; }
    .tab { padding: 8px 8px; font-size: 0.85rem; }
    .tab .cnt { margin-left: 4px; padding: 1px 6px; font-size: 0.66rem; }
    .tab-full { display: none; }
    .tab-short { display: inline; }

    /* Toolbar: 🔍 icon + status filter on one line; tap 🔍 to open the search box */
    .toolbar { gap: 8px; }
    .search-toggle { display: inline-flex; align-items: center; justify-content: center; padding: 0 14px; order: 1; align-self: stretch; }
    .toolbar select { order: 2; flex: 1 1 auto; }
    .toolbar #search { display: none; order: 3; }
    .toolbar.search-open #search { display: block; flex: 1 1 100%; }
    .toolbar .right { order: 4; margin-left: 0; width: 100%; }
    .toolbar .right .btn { flex: 1 1 auto; }

    table { font-size: 0.84rem; }
    thead th { padding: 9px 8px; font-size: 0.64rem; }
    tbody td { padding: 9px 8px; }
    /* On small screens, collapse less-critical columns and compact the date */
    .col-cv, .th-cv { display: none; }
    .date-full { display: none; }
    .date-short { display: inline; }
    .drawer-grid { grid-template-columns: 1fr; }

    .attention-pop { top: 10px; right: 10px; left: 10px; width: auto; max-width: none; }

    /* CV rules stack on phones: name+track on one line, keywords below */
    .cv-rule { grid-template-columns: 1fr 100px auto; }
    .cv-rule .rule-kw { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>💼 Application Tracker</h1>
  </header>

  <!-- Sync / connection card (rendered by JS) -->
  <div class="card" id="syncCard"></div>

  <!-- Tabs (PM / Finance / All) -->
  <div class="tabs" id="tabs"></div>

  <!-- Attention bar (new email alerts; rendered by JS) -->
  <div id="attentionBar"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <button class="btn secondary small search-toggle" id="searchToggle" title="Search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <input type="search" id="search" placeholder="Search company or role…" />
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option>Applied</option><option>Screening</option><option>Interview</option>
      <option>Offer</option><option>Rejected</option><option>Withdrawn</option>
    </select>
    <div class="right">
      <button class="btn small" id="addBtn">+ Add application</button>
      <button class="btn secondary small" id="exportCsv">Export CSV</button>
      <button class="btn secondary small" id="exportJson">Export JSON</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-date">Date</th>
          <th class="th-track">Track</th>
          <th class="th-company">Company</th>
          <th class="th-role">Role</th>
          <th class="th-status">Status</th>
          <th class="th-cv">CV</th>
          <th class="th-link">Link</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Slide-out drawer for add / edit -->
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <button class="close" id="drawerClose" title="Close">×</button>
    <h2 class="drawer-title" id="drawerTitle">Add application</h2>
    <div class="drawer-sub" id="drawerSub"></div>
  </div>
  <div class="drawer-body">
    <form id="appForm" autocomplete="off">
      <input type="hidden" id="editId" />
      <div class="drawer-grid">
        <div class="field full">
          <label for="company">Company name <span class="req">*</span></label>
          <input type="text" id="company" required />
        </div>
        <div class="field full">
          <label for="role">Job title / role</label>
          <input type="text" id="role" />
        </div>
        <div class="field">
          <label for="category">Track</label>
          <select id="category">
            <option>PM</option><option>Finance</option><option>Other</option>
          </select>
        </div>
        <div class="field" id="statusField">
          <label for="status">Status</label>
          <select id="status">
            <option>Applied</option><option>Screening</option><option>Interview</option>
            <option>Offer</option><option>Rejected</option><option>Withdrawn</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Application date</label>
          <input type="date" id="date" />
        </div>
        <div class="field">
          <label for="cv">CV version used</label>
          <input type="text" id="cv" placeholder="e.g. PM CV v3" />
        </div>
        <div class="field full">
          <label for="link">Link to posting</label>
          <input type="url" id="link" placeholder="https://…" />
        </div>
        <div class="field full">
          <label for="jd">Job description</label>
          <textarea id="jd" class="jd" placeholder="Paste the full JD here…"></textarea>
        </div>
        <div class="field full">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Anything worth remembering…"></textarea>
        </div>
      </div>
    </form>
  </div>
  <div class="drawer-foot">
    <button type="submit" form="appForm" class="btn" id="submitBtn">Add application</button>
    <button type="button" class="btn" id="doneBtn" style="display:none;">Done</button>
    <span class="muted" id="autosaveHint" style="display:none;font-size:0.8rem;">Changes save automatically</span>
    <span class="spacer"></span>
    <button type="button" class="btn danger small" id="deleteBtn" style="display:none;">Delete</button>
  </div>
</aside>

<script>
(function () {
  "use strict";

  // ---- Config ----
  var LS_TOKEN = "jat.token";
  var LS_GIST  = "jat.gistId";
  var LS_CACHE = "jat.cache";
  var LS_GMAIL = "jat.gmailUrl";
  var LS_SETTINGS = "jat.settings";
  var SETTINGS_FILE = "tracker-settings.json";
  var OLD_KEY  = "jobApplications.v1"; // migrate from the pre-sync version
  var FILENAME = "job-applications.csv";
  var STATUSES = ["Applied", "Screening", "Interview", "Offer", "Rejected", "Withdrawn"];
  var CATEGORIES = ["PM", "Finance", "Other"];
  var COLS = ["id", "createdAt", "updatedAt", "company", "role", "category", "date", "cv", "status", "link", "jd", "notes", "alert", "alertMsg"];

  // ---- State ----
  var token  = localStorage.getItem(LS_TOKEN) || null;
  var gistId = localStorage.getItem(LS_GIST)  || null;
  var gmailUrl = localStorage.getItem(LS_GMAIL) || null;
  var gmailNote = "";
  var gmailChecking = false;
  var settingsOpen = false;
  var settingsDraft = null;   // in-progress edits in the ⚙ panel (survives re-renders)
  var settings = loadSettings();
  var entries = loadCache();
  var currentTab = "PM";        // "" (all) | "PM" | "Finance" | "Other"
  var syncState = token && gistId ? "idle" : "off"; // off | idle | saving | ok | error | pulling
  var syncMsg = "";
  var saving = false, pendingSave = false;

  // ---- Elements ----
  var form = document.getElementById("appForm");
  var tbody = document.getElementById("tbody");
  var tabsEl = document.getElementById("tabs");
  var attentionBar = document.getElementById("attentionBar");
  var syncCard = document.getElementById("syncCard");
  var searchEl = document.getElementById("search");
  var statusFilterEl = document.getElementById("statusFilter");
  var editIdEl = document.getElementById("editId");
  var drawer = document.getElementById("drawer");
  var backdrop = document.getElementById("backdrop");
  var drawerTitle = document.getElementById("drawerTitle");
  var drawerSub = document.getElementById("drawerSub");
  var submitBtn = document.getElementById("submitBtn");
  var doneBtn = document.getElementById("doneBtn");
  var autosaveHint = document.getElementById("autosaveHint");
  var deleteBtn = document.getElementById("deleteBtn");
  var dateEl = document.getElementById("date");
  var statusField = document.getElementById("statusField");

  // ---- Init ----
  renderAll();
  if (token && gistId) { pull(); }  // pull latest from the Gist on load

  // =========================================================
  //  Cache (instant offline display + fallback)
  // =========================================================
  function loadCache() {
    try {
      var raw = localStorage.getItem(LS_CACHE);
      if (raw) return normalize(JSON.parse(raw));
      var old = localStorage.getItem(OLD_KEY); // one-time migration
      if (old) return normalize(JSON.parse(old));
      return [];
    } catch (e) { return []; }
  }
  function normalize(list) {
    (list || []).forEach(function (e) {
      if (!e.category) e.category = "PM";
      if (!e.updatedAt) e.updatedAt = e.createdAt || 0;
      if (e.alert == null) e.alert = "";
      if (e.alertMsg == null) e.alertMsg = "";
    });
    return list || [];
  }
  function saveCache() {
    try { localStorage.setItem(LS_CACHE, JSON.stringify(entries)); } catch (e) {}
  }

  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(LS_SETTINGS)) || { cvMap: [] }; }
    catch (e) { return { cvMap: [] }; }
  }
  function saveSettingsCache() {
    try { localStorage.setItem(LS_SETTINGS, JSON.stringify(settings)); } catch (e) {}
  }
  // Settings live in the Gist too, so the Gmail script can use the CV rules.
  function pushSettings() {
    if (!token || !gistId) return Promise.resolve();
    var files = {};
    files[SETTINGS_FILE] = { content: JSON.stringify(settings, null, 2) };
    return api("PATCH", "/gists/" + gistId, { files: files }).catch(function (e) {
      setSync("error", e.message);
    });
  }

  // =========================================================
  //  GitHub Gist API
  // =========================================================
  function api(method, path, body) {
    return fetch("https://api.github.com" + path, {
      method: method,
      cache: "no-store",  // GitHub serves max-age=60; never show a stale Gist
      headers: {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: body ? JSON.stringify(body) : undefined
    }).then(function (res) {
      if (!res.ok) {
        return res.text().then(function (t) {
          var m = res.status;
          if (res.status === 401) m = "401 — token rejected. Check the token.";
          else if (res.status === 404) m = "404 — Gist not found. Check the Gist ID.";
          else if (res.status === 403) m = "403 — rate limited or token lacks 'gist' scope.";
          throw new Error("GitHub " + m + (t ? " " + t.slice(0, 120) : ""));
        });
      }
      return res.status === 204 ? {} : res.json();
    });
  }

  function pull() {
    if (!token || !gistId) return Promise.resolve();
    setSync("pulling");
    return api("GET", "/gists/" + gistId).then(function (g) {
      var sf = g.files && g.files[SETTINGS_FILE];
      if (sf && sf.content) {
        try { settings = JSON.parse(sf.content); if (!settings.cvMap) settings.cvMap = []; saveSettingsCache(); }
        catch (e) {}
      }
      var f = g.files && g.files[FILENAME];
      var textPromise;
      if (!f) { textPromise = Promise.resolve(""); }
      else if (f.truncated && f.raw_url) { textPromise = fetch(f.raw_url).then(function (r) { return r.text(); }); }
      else { textPromise = Promise.resolve(f.content || ""); }
      return textPromise;
    }).then(function (text) {
      entries = normalize(fromCSV(text));
      saveCache();
      setSync("ok");
      renderAll();
    }).catch(function (e) {
      setSync("error", e.message);
      renderAll();
    });
  }

  function push() {
    if (!token || !gistId) return;
    if (saving) { pendingSave = true; return; }
    saving = true;
    setSync("saving");
    var files = {}; files[FILENAME] = { content: toCSV(entries) };
    api("PATCH", "/gists/" + gistId, { files: files }).then(function () {
      saving = false;
      setSync("ok");
      if (pendingSave) { pendingSave = false; push(); }
    }).catch(function (e) {
      saving = false;
      setSync("error", e.message);
    });
  }

  // Trigger the Gmail Apps Script (deployed as a Web App) via JSONP, then
  // pull the Gist to pick up any status changes / alerts it wrote.
  function checkEmail() {
    if (!gmailUrl) { settingsOpen = true; gmailNote = "Set the Gmail Web App URL first"; renderSync(); return; }
    if (gmailChecking) return;
    gmailChecking = true; gmailNote = "Checking…"; renderSync();

    // Live progress: the script writes "sync:done/total" into the Gist's
    // description as it scans; poll it while the check runs.
    var progressPoll = setInterval(function () {
      api("GET", "/gists/" + gistId).then(function (g) {
        var m = /sync:(\d+)\/(\d+)/.exec(g.description || "");
        if (m && gmailChecking) { gmailNote = "Checking " + m[1] + "/" + m[2] + "…"; renderSync(); }
      }).catch(function () {});
    }, 1500);
    function stopProgress() { clearInterval(progressPoll); }

    // Apps Script serves its response as text/html + nosniff, so JSONP/script
    // tags won't execute and it sends no CORS headers to read a normal fetch.
    // So we fire a no-cors request purely to TRIGGER the sync server-side; the
    // promise resolves only after doGet() has finished writing the Gist, then
    // we pull the fresh data (the ❗ flags are the real feedback).
    var before = JSON.stringify(entries);  // snapshot to detect when fresh data lands
    var sep = gmailUrl.indexOf("?") === -1 ? "?" : "&";
    fetch(gmailUrl + sep + "t=" + Date.now(), { mode: "no-cors", cache: "no-store", redirect: "follow" })
      .then(function () {
        stopProgress();
        // Pull until the data actually changes (Gist writes can lag a moment).
        // If the scan flagged nothing, data never changes — stop after 4 tries.
        var tries = 0;
        function attempt() {
          return pull().then(function () {
            if (JSON.stringify(entries) !== before || ++tries >= 4) return;
            return new Promise(function (res) { setTimeout(res, 1200); }).then(attempt);
          });
        }
        return attempt();
      })
      .then(function () {
        gmailChecking = false;
        gmailNote = JSON.stringify(entries) !== before ? "Checked email — updates found" : "Checked email — nothing new";
        renderSync();
      })
      .catch(function () {
        stopProgress();
        gmailChecking = false;
        gmailNote = "Check failed — verify the Web App URL (⚙ to re-enter).";
        renderSync();
      });
  }

  function connect(inToken, inGist) {
    token = inToken;
    setConnMsg("Connecting…", "");
    var ready;
    if (inGist) {
      gistId = inGist;
      ready = pull().then(function () {
        if (syncState === "error") throw new Error(syncMsg);
      });
    } else {
      setConnMsg("Creating a private Gist…", "");
      var files = {}; files[FILENAME] = { content: toCSV(entries) };
      ready = api("POST", "/gists", {
        description: "Job Application Tracker — data (private)",
        public: false,
        files: files
      }).then(function (g) {
        gistId = g.id;
        return pull();
      });
    }
    return ready.then(function () {
      localStorage.setItem(LS_TOKEN, token);
      localStorage.setItem(LS_GIST, gistId);
      setSync("ok");
      renderAll();
    }).catch(function (e) {
      token = localStorage.getItem(LS_TOKEN) || null;
      gistId = localStorage.getItem(LS_GIST) || null;
      setConnMsg("Failed: " + e.message, "err");
    });
  }

  function disconnect() {
    localStorage.removeItem(LS_TOKEN);
    localStorage.removeItem(LS_GIST);
    token = null; gistId = null;
    setSync("off");
    renderAll();
  }

  // =========================================================
  //  CSV
  // =========================================================
  function csvCell(v) {
    var s = v == null ? "" : String(v);
    if (/[",\r\n]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function toCSV(list) {
    var rows = [COLS.join(",")];
    list.forEach(function (e) {
      rows.push(COLS.map(function (c) { return csvCell(e[c]); }).join(","));
    });
    return rows.join("\r\n");
  }
  function parseCSV(text) {
    var rows = [], row = [], field = "", i = 0, inQ = false;
    while (i < text.length) {
      var ch = text[i];
      if (inQ) {
        if (ch === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQ = false; i++; continue;
        }
        field += ch; i++; continue;
      } else {
        if (ch === '"') { inQ = true; i++; continue; }
        if (ch === ",") { row.push(field); field = ""; i++; continue; }
        if (ch === "\r") { i++; continue; }
        if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
        field += ch; i++; continue;
      }
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    return rows;
  }
  function fromCSV(text) {
    if (!text || !text.trim()) return [];
    var rows = parseCSV(text);
    if (!rows.length) return [];
    var header = rows[0];
    var out = [];
    for (var i = 1; i < rows.length; i++) {
      var r = rows[i];
      if (r.length === 1 && r[0] === "") continue;
      var obj = {};
      header.forEach(function (h, idx) { obj[h] = r[idx] != null ? r[idx] : ""; });
      obj.createdAt = obj.createdAt ? Number(obj.createdAt) : 0;
      obj.updatedAt = obj.updatedAt ? Number(obj.updatedAt) : obj.createdAt;
      if (!obj.id) obj.id = uid();
      if (!obj.category) obj.category = "PM";
      out.push(obj);
    }
    return out;
  }

  // =========================================================
  //  Helpers
  // =========================================================
  function today() {
    var d = new Date();
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function catClass(c) { return CATEGORIES.indexOf(c) === -1 ? "Other" : c; }
  function fmtDate(iso) {
    if (!iso) return "—";
    var p = String(iso).split("-");
    if (p.length !== 3) return iso;
    var d = new Date(p[0], p[1] - 1, p[2]);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
  }
  function fmtDateShort(iso) {
    if (!iso) return "—";
    var p = String(iso).split("-");
    if (p.length !== 3) return iso;
    return p[2] + "/" + p[1] + "/" + p[0].slice(2);   // 10/07/26
  }

  function persist() { saveCache(); push(); }

  // =========================================================
  //  Drawer (add / edit)
  // =========================================================
  function openDrawer(entry) {
    if (entry) {
      editIdEl.value = entry.id;
      document.getElementById("company").value = entry.company || "";
      document.getElementById("role").value = entry.role || "";
      document.getElementById("category").value = catClass(entry.category);
      dateEl.value = entry.date || today();
      document.getElementById("cv").value = entry.cv || "";
      document.getElementById("status").value = entry.status || "Applied";
      document.getElementById("link").value = entry.link || "";
      document.getElementById("jd").value = entry.jd || "";
      document.getElementById("notes").value = entry.notes || "";
      drawerTitle.textContent = entry.company || "Application";
      drawerSub.textContent = [entry.role, catClass(entry.category)].filter(Boolean).join(" · ");
      submitBtn.style.display = "none";   // editing autosaves — no save button
      doneBtn.style.display = "";
      autosaveHint.style.display = "";
      deleteBtn.style.display = "";
      statusField.style.display = "";   // status is editable only once the entry exists
    } else {
      form.reset();
      editIdEl.value = "";
      document.getElementById("category").value = (currentTab && currentTab !== "") ? currentTab : "PM";
      document.getElementById("status").value = "Applied";  // new entries always start as Applied
      dateEl.value = today();
      drawerTitle.textContent = "Add application";
      drawerSub.textContent = "";
      submitBtn.textContent = "Add application";
      submitBtn.style.display = "";
      doneBtn.style.display = "none";
      autosaveHint.style.display = "none";
      deleteBtn.style.display = "none";
      statusField.style.display = "none";
    }
    drawer.classList.add("open");
    backdrop.classList.add("open");
    drawer.setAttribute("aria-hidden", "false");
    setTimeout(function () { document.getElementById("company").focus(); }, 60);
  }
  function closeDrawer() {
    flushEdit();   // persist any in-progress edits before closing
    drawer.classList.remove("open");
    backdrop.classList.remove("open");
    drawer.setAttribute("aria-hidden", "true");
    renderAll();
  }

  document.getElementById("addBtn").addEventListener("click", function () { openDrawer(null); });
  document.getElementById("drawerClose").addEventListener("click", closeDrawer);
  doneBtn.addEventListener("click", closeDrawer);
  backdrop.addEventListener("click", closeDrawer);
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeDrawer(); });

  function collectForm() {
    return {
      company: document.getElementById("company").value.trim(),
      role: document.getElementById("role").value.trim(),
      category: document.getElementById("category").value,
      date: dateEl.value || today(),
      cv: document.getElementById("cv").value.trim(),
      status: document.getElementById("status").value,
      link: document.getElementById("link").value.trim(),
      jd: document.getElementById("jd").value.trim(),
      notes: document.getElementById("notes").value.trim()
    };
  }

  function applyEdit(id, data) {
    data.updatedAt = Date.now();  // any edit bumps the entry to the top
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].id === id) { entries[i] = Object.assign(entries[i], data); break; }
    }
  }

  // Persist in-progress edits (called on field change and on drawer close).
  function flushEdit() {
    var id = editIdEl.value;
    if (!id) return;                       // add mode: nothing to autosave
    var data = collectForm();
    if (!data.company) return;             // don't wipe the required field mid-edit
    applyEdit(id, data);
    persist();
  }

  // Autosave existing entries as you edit — no save button needed.
  form.addEventListener("change", function () { flushEdit(); });

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var data = collectForm();
    if (!data.company) return;
    var id = editIdEl.value;
    if (id) {
      applyEdit(id, data);
    } else {
      data.id = uid();
      data.createdAt = Date.now();
      data.updatedAt = data.createdAt;
      entries.push(data);
    }
    persist();
    closeDrawer();
  });

  deleteBtn.addEventListener("click", function () {
    var id = editIdEl.value;
    if (!id) return;
    var en = findById(id);
    if (confirm("Delete " + (en ? en.company : "this application") + "? This cannot be undone.")) {
      entries = entries.filter(function (x) { return x.id !== id; });
      persist();
      closeDrawer();
      renderAll();
    }
  });

  // ---- Filters ----
  searchEl.addEventListener("input", renderList);
  statusFilterEl.addEventListener("change", renderList);
  document.getElementById("searchToggle").addEventListener("click", function () {
    var tb = document.getElementById("toolbar");
    tb.classList.toggle("search-open");
    if (tb.classList.contains("search-open")) { searchEl.focus(); }
    else { searchEl.value = ""; renderList(); }   // closing the search clears the filter
  });

  function getFiltered() {
    var q = searchEl.value.trim().toLowerCase();
    var sf = statusFilterEl.value;
    return entries.filter(function (e) {
      if (currentTab && catClass(e.category) !== currentTab) return false;
      if (sf && e.status !== sf) return false;
      if (q && ((e.company || "") + " " + (e.role || "")).toLowerCase().indexOf(q) === -1) return false;
      return true;
    }).sort(function (a, b) {
      var d = dateToTs(b.date) - dateToTs(a.date);   // chronological: newest application first
      if (d) return d;
      return activityTs(b) - activityTs(a);          // same day: most recently touched first
    });
  }

  function activityTs(e) {
    var t = Date.parse(e.updatedAt || e.createdAt || "");
    return isNaN(t) ? dateToTs(e.date) : t;
  }
  function dateToTs(iso) {
    if (!iso) return 0;
    var p = String(iso).split("-");
    if (p.length !== 3) return 0;
    var d = new Date(p[0], p[1] - 1, p[2]);
    return isNaN(d) ? 0 : d.getTime();
  }

  // =========================================================
  //  Render
  // =========================================================
  function renderAll() { renderSync(); renderTabs(); renderAttention(); renderList(); }

  function isAlert(e) { return e.alert && e.alert !== "0" && e.alert !== "false"; }

  // Alerts the popup has already been shown for (persisted across reloads).
  // Keyed by id + the alert message, so the SAME entry getting NEW news
  // (e.g. Interview -> Rejected) still pops up again.
  var LS_ATTN = "jat.attnSeen";
  function attnKey(e) { return e.id + "|" + (e.alertMsg || ""); }
  function loadSeen() {
    try { return JSON.parse(localStorage.getItem(LS_ATTN)) || []; } catch (err) { return []; }
  }
  function saveSeen(list) {
    try { localStorage.setItem(LS_ATTN, JSON.stringify(list)); } catch (err) {}
  }

  // ---- Bulk link matching (popup) ----
  // Generic URL words that say nothing about which company/role a link is for.
  var URL_NOISE = ["https", "http", "www", "com", "net", "org", "io", "co", "uk",
    "jobs", "job", "careers", "career", "apply", "application", "applications",
    "boards", "board", "posting", "postings", "position", "positions", "vacancy",
    "vacancies", "opening", "openings", "role", "roles", "en", "gb", "us",
    "ashbyhq", "greenhouse", "lever", "workable", "teamtailor", "smartrecruiters",
    "workday", "myworkdayjobs", "bamboohr", "recruitee", "icims", "jobvite",
    "linkedin", "indeed", "otta", "welcometothejungle"];
  function urlTokens(u) {
    var s = u.toLowerCase();
    try { s = decodeURIComponent(s); } catch (err) {}
    return s.split(/[^a-z0-9]+/).filter(function (t) {
      return t.length >= 3 && URL_NOISE.indexOf(t) === -1;
    });
  }
  function spaceless(s) { return (s || "").toLowerCase().replace(/[^a-z0-9]+/g, ""); }
  function shortUrl(u) {
    return u.replace(/^https?:\/\/(www\.)?/, "").slice(0, 42) + (u.length > 50 ? "…" : "");
  }
  // Score how well a URL fits an entry: company slug in the URL counts most,
  // then individual company words, then role words.
  function linkScore(u, entry) {
    var toks = urlTokens(u);
    var flat = spaceless(u);
    var score = 0;
    var comp = spaceless(entry.company);
    if (comp.length >= 4 && flat.indexOf(comp) !== -1) score += 4;
    (entry.company || "").toLowerCase().split(/[^a-z0-9]+/).forEach(function (w) {
      if (w.length >= 3 && URL_NOISE.indexOf(w) === -1 && toks.indexOf(w) !== -1) score += 2;
    });
    (entry.role || "").toLowerCase().split(/[^a-z0-9]+/).forEach(function (w) {
      if (w.length >= 4 && URL_NOISE.indexOf(w) === -1 && toks.indexOf(w) !== -1) score += 1;
    });
    return score;
  }
  function matchLinksToEntries(urls, candidates) {
    var pairs = [];
    urls.forEach(function (u, ui) {
      candidates.forEach(function (e, ei) {
        var s = linkScore(u, e);
        if (s >= 2) pairs.push({ s: s, ui: ui, ei: ei });
      });
    });
    pairs.sort(function (a, b) { return b.s - a.s; });
    var usedUrl = {}, usedEntry = {}, matched = [];
    pairs.forEach(function (p) {
      if (usedUrl[p.ui] || usedEntry[p.ei]) return;
      usedUrl[p.ui] = usedEntry[p.ei] = true;
      matched.push({ url: urls[p.ui], entry: candidates[p.ei] });
    });
    var leftover = urls.filter(function (u, i) { return !usedUrl[i]; });
    return { matched: matched, leftover: leftover };
  }

  function renderAttention() {
    var flagged = entries.filter(isAlert);
    var keys = flagged.map(attnKey);
    // Prune stale entries (alerts that were dismissed) so this can't grow forever.
    var seen = loadSeen().filter(function (k) { return keys.indexOf(k) !== -1; });
    saveSeen(seen);
    var fresh = flagged.filter(function (e) { return seen.indexOf(attnKey(e)) === -1; });
    // Only pop for alerts this browser hasn't shown yet.
    if (!fresh.length) { attentionBar.className = ""; attentionBar.innerHTML = ""; return; }
    var names = fresh.slice(0, 3).map(function (e) { return esc(e.company); }).join(", ");
    if (fresh.length > 3) names += " +" + (fresh.length - 3) + " more";
    // Entries auto-created from email arrive without a job link — offer an
    // inline paste box per entry so the link lands on the right row.
    var needLink = fresh.filter(function (e) {
      return !e.link && /auto-added/i.test(e.alertMsg || "");
    });
    attentionBar.className = "attention-pop";
    attentionBar.innerHTML =
      '<button class="close" id="attnCloseBtn" title="Hide">×</button>' +
      '<div>❗ ' + fresh.length + (fresh.length === 1 ? " application needs" : " applications need") +
        ' attention</div>' +
      '<div class="sub">' + names + '</div>' +
      (needLink.length
        ? '<div class="link-fills">' +
            '<div class="lf-hint">' + needLink.length + ' new ' +
              (needLink.length === 1 ? 'entry has' : 'entries have') +
              ' no job link. Paste the links below (one per line) and they will be matched up automatically.</div>' +
            '<textarea id="lfText" placeholder="https://..."></textarea>' +
            '<div class="lf-result" id="lfResult"></div>' +
          '</div>'
        : "") +
      '<div class="actions">' +
        (needLink.length ? '<button class="btn secondary small" id="lfMatchBtn">Match links</button> ' : "") +
        '<button class="btn secondary small" id="dismissAllBtn">Dismiss all</button></div>';
    var lfMatchBtn = document.getElementById("lfMatchBtn");
    if (lfMatchBtn) lfMatchBtn.addEventListener("click", function () {
      var ta = document.getElementById("lfText");
      var out = document.getElementById("lfResult");
      var urls = (ta.value.match(/https?:\/\/\S+/g) || []);
      if (!urls.length) { out.textContent = "No links found in the box."; return; }
      // Match against every entry still missing a link, not only the fresh ones.
      var candidates = entries.filter(function (e) { return !e.link; });
      var result = matchLinksToEntries(urls, candidates);
      if (result.matched.length) {
        result.matched.forEach(function (m) {
          m.entry.link = m.url;
          m.entry.updatedAt = new Date().toISOString();
        });
        persist();
        renderList();
      }
      var lines = result.matched.map(function (m) {
        return "✓ " + esc(m.entry.company) + " ← " + esc(shortUrl(m.url));
      });
      result.leftover.forEach(function (u) {
        lines.push("✗ no match: " + esc(shortUrl(u)));
      });
      out.innerHTML = lines.join("<br>");
      ta.value = result.leftover.join("\n");
    });
    document.getElementById("attnCloseBtn").addEventListener("click", function () {
      saveSeen(keys);        // mark all current alerts as shown; row ❗ flags stay
      renderAttention();
    });
    document.getElementById("dismissAllBtn").addEventListener("click", function () {
      flagged.forEach(function (e) { e.alert = ""; e.alertMsg = ""; });
      saveSeen([]);
      persist();
      renderAll();
    });
  }

  function setSync(state, msg) { syncState = state; syncMsg = msg || ""; renderSync(); }

  function renderTabs() {
    var counts = { "": entries.length, PM: 0, Finance: 0, Other: 0 };
    entries.forEach(function (e) { counts[catClass(e.category)]++; });
    var tabsDef = [
      { key: "PM", label: "PM roles", short: "PM" },
      { key: "Finance", label: "Finance roles", short: "Finance" },
      { key: "", label: "All", short: "All" }
    ];
    if (counts.Other > 0) tabsDef.splice(2, 0, { key: "Other", label: "Other", short: "Other" });
    tabsEl.innerHTML = tabsDef.map(function (t) {
      return '<button class="tab' + (currentTab === t.key ? " active" : "") + '" data-tab="' + t.key + '">' +
        '<span class="tab-full">' + esc(t.label) + '</span><span class="tab-short">' + esc(t.short) + '</span>' +
        '<span class="cnt">' + counts[t.key] + '</span></button>';
    }).join("");
  }

  tabsEl.addEventListener("click", function (e) {
    var t = e.target.closest("[data-tab]");
    if (!t) return;
    currentTab = t.getAttribute("data-tab");
    renderTabs();
    renderList();
  });

  function renderSync() {
    if (!token || !gistId) {
      syncCard.className = "card setup";
      syncCard.innerHTML =
        '<h2>Connect to sync across devices</h2>' +
        '<p class="muted">Your applications are saved as a private CSV on your GitHub. ' +
        'Paste your token below. On your <strong>first device</strong>, leave the Gist ID blank — ' +
        'a new private Gist is created and its ID shown here to reuse elsewhere.</p>' +
        '<div style="display:grid;grid-template-columns:1fr;gap:14px;">' +
          '<div class="field"><label for="tokenInput">GitHub token</label>' +
            '<input type="password" id="tokenInput" placeholder="ghp_… (stored only in this browser)" /></div>' +
          '<div class="field"><label for="gistInput">Gist ID ' +
            '<span class="muted">— blank on first device; paste the shown ID on others</span></label>' +
            '<input type="text" id="gistInput" placeholder="(leave blank to create a new private Gist)" /></div>' +
        '</div>' +
        '<div class="conn-actions"><button class="btn" id="connectBtn">Connect &amp; sync</button></div>' +
        '<div class="conn-msg" id="connMsg"></div>';
      var cb = document.getElementById("connectBtn");
      cb.addEventListener("click", function () {
        var t = document.getElementById("tokenInput").value.trim();
        var g = document.getElementById("gistInput").value.trim();
        if (!t) { setConnMsg("Please paste your GitHub token.", "err"); return; }
        cb.disabled = true; cb.textContent = "Connecting…";
        connect(t, g);
      });
      if (syncMsg) setConnMsg(syncMsg, "err");
      return;
    }

    var label = { idle: "Synced", ok: "Synced", saving: "Saving…", pulling: "Refreshing…",
                  error: "Sync error", off: "Not connected" }[syncState] || "Synced";
    var dotClass = { ok: "ok", idle: "ok", saving: "saving", pulling: "saving",
                     error: "error", off: "off" }[syncState] || "ok";
    syncCard.className = "card";
    syncCard.innerHTML =
      '<div class="sync-row">' +
        '<span class="sync-status"><span class="dot ' + dotClass + '"></span>' + esc(label) + '</span>' +
        (syncState === "error" && syncMsg ? '<span class="sync-note err">' + esc(syncMsg) + '</span>' :
          (gmailNote ? '<span class="sync-note">' + esc(gmailNote) + '</span>' : '')) +
        '<span class="spacer"></span>' +
        '<button class="btn secondary small" id="gmailBtn"' + (gmailChecking ? ' disabled' : '') + '>' +
          (gmailChecking ? "Checking…" : "📧 Check email") + '</button>' +
        '<span class="sync-break"></span>' +
        '<button class="btn secondary small sync-act" id="gmailCfgBtn" title="Settings">⚙</button>' +
        '<button class="btn secondary small sync-act" id="refreshBtn">Refresh</button>' +
        '<button class="btn secondary small icon-btn sync-act" id="disconnectBtn" title="Disconnect">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>' +
          '</svg>' +
        '</button>' +
      '</div>' +
      (settingsOpen ? settingsPanelHtml() : '');
    document.getElementById("refreshBtn").addEventListener("click", pull);
    document.getElementById("gmailBtn").addEventListener("click", checkEmail);
    document.getElementById("gmailCfgBtn").addEventListener("click", function () {
      settingsOpen = !settingsOpen;
      settingsDraft = null;
      renderSync();
    });
    document.getElementById("disconnectBtn").addEventListener("click", function () {
      if (confirm("Disconnect this device? Your data stays safe in the Gist; you can reconnect with the same Gist ID.")) disconnect();
    });
    if (settingsOpen) bindSettingsPanel();
  }

  // ---- ⚙ settings panel (Gmail URL + CV auto-match rules + Gist ID) ----

  function currentDraft() {
    if (settingsDraft) return settingsDraft;
    return {
      url: gmailUrl || "",
      cvMap: (settings.cvMap || []).map(function (r) {
        return { cv: r.cv || "", keywords: (r.keywords || []).join(", "), category: r.category || "PM" };
      })
    };
  }

  function settingsPanelHtml() {
    var d = currentDraft();
    var rows = d.cvMap.map(function (r, i) {
      var opts = CATEGORIES.map(function (c) {
        return '<option' + (r.category === c ? " selected" : "") + '>' + c + '</option>';
      }).join("");
      return '<div class="cv-rule">' +
        '<input type="text" class="rule-cv" placeholder="CV name (e.g. CVpm)" value="' + esc(r.cv) + '" />' +
        '<input type="text" class="rule-kw" placeholder="role keywords, comma separated (e.g. product manager, pm, apm)" value="' + esc(r.keywords) + '" />' +
        '<select class="rule-cat">' + opts + '</select>' +
        '<button type="button" class="btn secondary small rule-del" data-idx="' + i + '" title="Remove rule">×</button>' +
        '</div>';
    }).join("");
    return '<div class="settings-panel">' +
      '<div class="field"><label for="gmailUrlInput">Gmail sync Web App URL (ends in /exec)</label>' +
        '<input type="text" id="gmailUrlInput" value="' + esc(d.url) + '" placeholder="https://script.google.com/…/exec" /></div>' +
      '<div class="field"><label>CV auto-match rules — emails naming a similar role get that CV &amp; track</label>' +
        '<div id="cvRules">' + (rows || '<p class="muted" style="margin:0;font-size:0.8rem;">No rules yet — add one so auto-added applications get the right CV.</p>') + '</div>' +
        '<div><button type="button" class="btn secondary small" id="addRuleBtn">+ Add rule</button></div></div>' +
      '<p class="muted gist-line">Private Gist ID: <code>' + esc(gistId) + '</code> — use it to connect another device.</p>' +
      '<div class="conn-actions">' +
        '<button class="btn small" id="saveSettingsBtn">Save</button>' +
        '<button class="btn secondary small" id="copyGistBtn">Copy Gist ID</button>' +
      '</div></div>';
  }

  function collectDraft() {
    var d = { url: document.getElementById("gmailUrlInput").value, cvMap: [] };
    var rows = syncCard.querySelectorAll(".cv-rule");
    for (var i = 0; i < rows.length; i++) {
      d.cvMap.push({
        cv: rows[i].querySelector(".rule-cv").value,
        keywords: rows[i].querySelector(".rule-kw").value,
        category: rows[i].querySelector(".rule-cat").value
      });
    }
    return d;
  }

  function bindSettingsPanel() {
    document.getElementById("addRuleBtn").addEventListener("click", function () {
      settingsDraft = collectDraft();
      settingsDraft.cvMap.push({ cv: "", keywords: "", category: "PM" });
      renderSync();
    });
    document.getElementById("cvRules").addEventListener("click", function (e) {
      var del = e.target.closest(".rule-del");
      if (!del) return;
      settingsDraft = collectDraft();
      settingsDraft.cvMap.splice(Number(del.getAttribute("data-idx")), 1);
      renderSync();
    });
    document.getElementById("saveSettingsBtn").addEventListener("click", function () {
      var d = collectDraft();
      gmailUrl = d.url.trim();
      if (gmailUrl) localStorage.setItem(LS_GMAIL, gmailUrl);
      else localStorage.removeItem(LS_GMAIL);
      settings.cvMap = d.cvMap.map(function (r) {
        return {
          cv: r.cv.trim(),
          keywords: r.keywords.split(",").map(function (k) { return k.trim(); }).filter(Boolean),
          category: CATEGORIES.indexOf(r.category) === -1 ? "Other" : r.category
        };
      }).filter(function (r) { return r.cv && r.keywords.length; });
      saveSettingsCache();
      pushSettings();
      settingsDraft = null;
      settingsOpen = false;
      gmailNote = "Settings saved";
      renderSync();
    });
    document.getElementById("copyGistBtn").addEventListener("click", function () {
      var btn = this;
      var done = function () { btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy Gist ID"; }, 1500); };
      if (navigator.clipboard) { navigator.clipboard.writeText(gistId).then(done, function () { prompt("Gist ID:", gistId); }); }
      else { prompt("Gist ID:", gistId); }
    });
  }

  function setConnMsg(msg, cls) {
    var el = document.getElementById("connMsg");
    if (el) { el.textContent = msg; el.className = "conn-msg " + (cls || ""); }
  }

  function renderList() {
    var items = getFiltered();
    if (!items.length) {
      var msg = entries.length ? "No applications match your filters." :
        "No applications yet. Click “+ Add application” to log your first one.";
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty">' + msg + '</div></td></tr>';
      return;
    }
    var html = "";
    items.forEach(function (e) {
      var cat = catClass(e.category);
      var flagged = isAlert(e);
      html += '<tr data-id="' + esc(e.id) + '"' + (flagged ? ' class="has-alert"' : '') + '>';
      html += '<td class="col-date"><span class="date-full">' + esc(fmtDate(e.date)) +
        '</span><span class="date-short">' + esc(fmtDateShort(e.date)) + '</span></td>';
      html += '<td><span class="tag ' + cat + '">' + esc(cat) + '</span></td>';
      html += '<td class="col-company">' +
        (flagged ? '<span class="alert-flag" data-clear-alert="' + esc(e.id) + '" data-noopen="1" title="' +
          esc(e.alertMsg || "New email — click to dismiss") + '">!</span>' : '') +
        esc(e.company) + '</td>';
      html += '<td class="col-role">' + (e.role ? esc(e.role) : '<span class="dash">—</span>') + '</td>';
      html += '<td>' + statusSelectHtml(e) + '</td>';
      html += '<td class="col-cv">' + (e.cv ? esc(e.cv) : '<span class="dash">—</span>') + '</td>';
      html += '<td class="col-link">' + (e.link
        ? '<a href="' + esc(e.link) + '" target="_blank" rel="noopener" data-noopen="1">open ↗</a>'
        : '<span class="dash">—</span>') + '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  function statusSelectHtml(e) {
    var status = STATUSES.indexOf(e.status) === -1 ? "Applied" : e.status;
    var opts = STATUSES.map(function (s) {
      return '<option value="' + s + '"' + (s === status ? " selected" : "") + '>' + s + '</option>';
    }).join("");
    return '<select class="status-select badge ' + esc(status) + '" data-status-id="' +
      esc(e.id) + '" data-noopen="1" title="Change status">' + opts + '</select>';
  }

  tbody.addEventListener("click", function (e) {
    var flag = e.target.closest("[data-clear-alert]");
    if (flag) {
      var fen = findById(flag.getAttribute("data-clear-alert"));
      if (fen) { fen.alert = ""; fen.alertMsg = ""; persist(); renderAll(); }
      return;
    }
    if (e.target.closest("[data-noopen]")) return; // links & inline status dropdown handle themselves
    var tr = e.target.closest("tr[data-id]");
    if (!tr) return;
    var en = findById(tr.getAttribute("data-id"));
    if (en) openDrawer(en);
  });

  // Inline status change straight from the table — bumps the row to the top.
  tbody.addEventListener("change", function (e) {
    var sel = e.target.closest("select[data-status-id]");
    if (!sel) return;
    var en = findById(sel.getAttribute("data-status-id"));
    if (!en || en.status === sel.value) return;
    en.status = sel.value;
    en.updatedAt = Date.now();
    persist();
    renderAll();
  });

  function findById(id) {
    for (var i = 0; i < entries.length; i++) if (entries[i].id === id) return entries[i];
    return null;
  }

  // =========================================================
  //  Export (local backup)
  // =========================================================
  document.getElementById("exportJson").addEventListener("click", function () {
    download(new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" }), "job-applications-" + today() + ".json");
  });
  document.getElementById("exportCsv").addEventListener("click", function () {
    download(new Blob([toCSV(entries)], { type: "text/csv" }), "job-applications-" + today() + ".csv");
  });
  function download(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
})();
</script>
</body>
</html>
